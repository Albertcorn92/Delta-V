name: Feature request
description: Propose a new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What mission/developer problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the design at a high level.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety / Verification Impact
      description: Mention affected DV requirements and tests.
  - type: checkboxes
    id: civilian_scope
    attributes:
      label: Civilian Scope Confirmation
      options:
        - label: This request is strictly civilian/non-weaponized and does not add targeting or fire-control behavior.
          required: true
