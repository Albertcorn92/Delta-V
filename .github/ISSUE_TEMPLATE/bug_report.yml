name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Exact commands/inputs to reproduce.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Evidence
      description: Include test output, stack trace, or packet captures.
  - type: input
    id: commit
    attributes:
      label: Commit / Tag
      placeholder: e.g. v4.0.0 or commit SHA
  - type: checkboxes
    id: scope
    attributes:
      label: Scope Confirmation
      options:
        - label: This report does not request military/weaponized behavior and remains in civilian scope.
          required: true
