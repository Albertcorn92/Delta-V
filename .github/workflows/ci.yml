name: DELTA-V CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 0. Legal compliance gate
  # ---------------------------------------------------------------------------
  legal-compliance:
    name: Legal Compliance Gate
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - name: Run legal compliance checker
        run: python3 tools/legal_compliance_check.py

  # ---------------------------------------------------------------------------
  # 1. Build & Test (Ubuntu, clang, gcc)
  # ---------------------------------------------------------------------------
  build-and-test:
    name: Build & Test — ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    needs: legal-compliance

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            compiler: gcc
            cc: gcc-12
            cxx: g++-12
          - os: ubuntu-22.04
            compiler: clang
            cc: clang-14
            cxx: clang++-14
          - os: macos-15
            compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            cmake ninja-build \
            libgtest-dev libgmock-dev \
            ${{ matrix.cc }} \
            lcov

      - name: Install system dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install cmake ninja googletest lcov

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml --quiet

      - name: Run autocoder
        run: python tools/autocoder.py

      - name: Configure (Debug + ASan/UBSan)
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build flight_software
        run: cmake --build build --target flight_software

      - name: Build run_tests
        run: cmake --build build --target run_tests

      - name: Build run_system_tests
        run: cmake --build build --target run_system_tests

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure --timeout 60

      - name: Configure (Release)
        env:
          CC:  ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build_release -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Release
        run: cmake --build build_release --target flight_software

  # ---------------------------------------------------------------------------
  # 2. Autocoder validation
  # ---------------------------------------------------------------------------
  autocoder-validate:
    name: Autocoder Validation
    runs-on: ubuntu-22.04
    needs: legal-compliance

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml --quiet
      - name: Dry-run validation
        run: python tools/autocoder.py --dry-run
      - name: Full autocoder run
        run: python tools/autocoder.py

  # ---------------------------------------------------------------------------
  # 3. Coverage report (Ubuntu gcc only)
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage Report
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libgtest-dev lcov g++-12

      - run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml --quiet
      - run: python tools/autocoder.py

      - name: Configure with coverage
        run: |
          cmake -B build_cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12

      - name: Build coverage binary
        run: cmake --build build_cov --target run_tests_coverage

      - name: Generate coverage report
        run: cmake --build build_cov --target coverage

      - name: Enforce coverage thresholds
        run: cmake --build build_cov --target coverage_guard

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: build_cov/cov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build_cov/coverage_html/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 4. Safety assurance gate (blocking)
  # ---------------------------------------------------------------------------
  safety-assurance:
    name: Safety Assurance Gate
    runs-on: ubuntu-22.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build clang-14 clang-tidy-14 libgtest-dev
          python -m pip install --upgrade pip
          python -m pip install pyyaml --quiet
      - run: python tools/autocoder.py
      - name: Configure
        env: { CC: clang-14, CXX: clang++-14 }
        run: |
          cmake -B build_tidy -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DDELTAV_SITL_SOAK_SECONDS=60
      - name: Run software-final gate
        run: cmake --build build_tidy --target software_final

      - name: Archive safety artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safety-assurance-artifacts
          path: |
            build_tidy/requirements_trace_matrix.md
            build_tidy/requirements_trace_matrix.json
            build_tidy/qualification/qualification_report.md
            build_tidy/qualification/qualification_report.json
            docs/SOFTWARE_FINAL_STATUS.md
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Python tool tests
  # ---------------------------------------------------------------------------
  python-tools:
    name: Python Tools
    runs-on: ubuntu-22.04
    needs: legal-compliance

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml --quiet

      - name: Autocoder dry-run
        run: python tools/autocoder.py --dry-run

      - name: Python syntax check (assurance tools)
        run: |
          python -m py_compile \
            tools/esp32_soak.py \
            tools/esp32_runtime_guard.py \
            tools/esp32_reboot_campaign.py \
            tools/legal_compliance_check.py \
            tools/software_final_check.py \
            tools/qualification_report.py

      - name: dv-util list
        run: python tools/dv-util.py list

      - name: dv-util check
        run: python tools/dv-util.py check

      - name: dv-util add-component roundtrip
        run: |
          python tools/dv-util.py add-component TestWidget --rate fast
          test -f src/TestWidgetComponent.hpp
          echo "TestWidgetComponent.hpp created OK"

      - name: Autocoder after add-component
        run: python tools/autocoder.py
