# =============================================================================
# DELTA-V Spacecraft Topology Blueprint  v4.0
# =============================================================================
# This file is the single source of truth for your spacecraft topology.
# The autocoder reads it to generate:
#   - src/Types.hpp          (C++ packet definitions)
#   - src/TopologyManager.hpp (component wiring)
#   - dictionary.json         (GDS ground dictionary)
#
# After ANY edit:
#   python3 tools/autocoder.py
#   cmake --build build
#
# To scaffold a new component:
#   python3 tools/dv-util.py boot-menu
#   python3 tools/dv-util.py add-component ThermalControl --rate norm --register
#   python3 tools/dv-util.py add-command   SET_HEATER --target-id 400 --opcode 1 --description "Set heater target"
# =============================================================================

system:
  name: "DeltaV_Flight_Computer"
  version: "4.0.3"

# ---------------------------------------------------------------------------
# Components
#
# id         : Unique integer. NEVER reuse after first flight.
# name       : Human-readable name shown in GDS.
# class      : C++ class name. Header must be <class>.hpp in src/.
# instance   : C++ variable name in TopologyManager.
# type       : Passive | Active
#              Passive  → executed by the rate group scheduler thread
#              Active   → owns its own Os::Thread (inherits ActiveComponent)
# rate_group : fast (10 Hz) | norm (1 Hz) | slow (0.1 Hz)
#              Ignored for Active components — they declare their own Hz.
# ---------------------------------------------------------------------------
components:

  # ── System Infrastructure (do not remove) ─────────────────────────────────
  - id: 1
    name: "Supervisor"
    class: "WatchdogComponent"
    instance: "watchdog"
    type: "Passive"
    rate_group: "norm"

  - id: 10
    name: "TelemHub"
    class: "TelemHub"
    instance: "telem_hub"
    type: "Passive"
    rate_group: "norm"

  - id: 11
    name: "CmdHub"
    class: "CommandHub"
    instance: "cmd_hub"
    type: "Passive"
    rate_group: "norm"

  - id: 12
    name: "EventHub"
    class: "EventHub"
    instance: "event_hub"
    type: "Passive"
    rate_group: "norm"

  # ── Radio — Active, owns a dedicated 20 Hz thread ─────────────────────────
  - id: 20
    name: "RadioLink"
    class: "TelemetryBridge"
    instance: "radio"
    type: "Active"

  # ── Flight Data Recorder ───────────────────────────────────────────────────
  - id: 30
    name: "BlackBox"
    class: "LoggerComponent"
    instance: "recorder"
    type: "Passive"
    rate_group: "norm"

  # ── Civilian Operations Apps ───────────────────────────────────────────────
  - id: 40
    name: "CmdSequencer"
    class: "CommandSequencerComponent"
    instance: "cmd_sequencer"
    type: "Passive"
    rate_group: "norm"

  - id: 41
    name: "FileTransfer"
    class: "FileTransferComponent"
    instance: "file_transfer"
    type: "Passive"
    rate_group: "norm"

  - id: 42
    name: "MemoryDwell"
    class: "MemoryDwellComponent"
    instance: "memory_dwell"
    type: "Passive"
    rate_group: "norm"

  - id: 43
    name: "TimeSync"
    class: "TimeSyncComponent"
    instance: "time_sync"
    type: "Passive"
    rate_group: "norm"

  - id: 44
    name: "Playback"
    class: "PlaybackComponent"
    instance: "playback"
    type: "Passive"
    rate_group: "norm"

  - id: 45
    name: "OtaManager"
    class: "OtaComponent"
    instance: "ota_manager"
    type: "Passive"
    rate_group: "norm"

  - id: 46
    name: "AtsRtsSequencer"
    class: "AtsRtsSequencerComponent"
    instance: "ats_rts"
    type: "Passive"
    rate_group: "norm"

  - id: 47
    name: "LimitChecker"
    class: "LimitCheckerComponent"
    instance: "limit_checker"
    type: "Passive"
    rate_group: "norm"

  - id: 48
    name: "CfdpManager"
    class: "CfdpComponent"
    instance: "cfdp_manager"
    type: "Passive"
    rate_group: "norm"

  - id: 49
    name: "ModeManager"
    class: "ModeManagerComponent"
    instance: "mode_manager"
    type: "Passive"
    rate_group: "norm"

  # ── Application Components — add your own below this line ──────────────────
  - id: 100
    name: "StarTracker"
    class: "SensorComponent"
    instance: "star_tracker"
    type: "Passive"
    rate_group: "fast"      # 10 Hz — high-rate attitude measurement

  - id: 200
    name: "BatterySystem"
    class: "PowerComponent"
    instance: "battery"
    type: "Passive"
    rate_group: "norm"      # 1 Hz — power budget monitoring

  - id: 300
    name: "IMU_01"
    class: "ImuComponent"
    instance: "imu_unit"
    type: "Passive"
    rate_group: "fast"      # 10 Hz — HAL-injected (Esp32I2c or MockI2c)

  - id: 400
    name: "PayloadMonitor"
    class: "PayloadMonitorComponent"
    instance: "payload_monitor"
    type: "Passive"
    rate_group: "norm"      # 1 Hz — low-rate civilian tech-demo payload profile

# ---------------------------------------------------------------------------
# Commands
#
# op_class controls which mission states accept this command (MissionFsm.hpp):
#   HOUSEKEEPING  — allowed in BOOT, NOMINAL, DEGRADED, and SAFE_MODE
#   OPERATIONAL   — blocked during SAFE_MODE and EMERGENCY
#   RESTRICTED    — NOMINAL state only (propulsion, payload deployment, etc.)
# ---------------------------------------------------------------------------
commands:

  - name: "RESET_BATTERY"
    target_id: 200
    opcode: 1
    op_class: "HOUSEKEEPING"
    description: "Resets battery SOC to 100% (simulation reset)"

  - name: "SET_DRAIN_RATE"
    target_id: 200
    opcode: 2
    op_class: "OPERATIONAL"
    description: "Sets battery discharge rate. arg: 0.0–10.0 (%/tick)"

  - name: "SET_STAR_AMPLITUDE"
    target_id: 100
    opcode: 1
    op_class: "OPERATIONAL"
    description: "Sets star tracker simulation sine amplitude. arg: float"

  - name: "IMU_RECALIBRATE"
    target_id: 300
    opcode: 1
    op_class: "OPERATIONAL"
    description: "Triggers IMU self-calibration sequence. arg: unused (0.0)"

  - name: "PAYLOAD_SET_ENABLE"
    target_id: 400
    opcode: 1
    op_class: "OPERATIONAL"
    description: "Enable or disable the reference payload profile. arg: >=0.5 enable, <0.5 disable"

  - name: "PAYLOAD_CAPTURE_SAMPLE"
    target_id: 400
    opcode: 2
    op_class: "RESTRICTED"
    description: "Capture one bounded reference payload sample. arg: requested sample magnitude"

  - name: "PAYLOAD_SET_GAIN"
    target_id: 400
    opcode: 3
    op_class: "HOUSEKEEPING"
    description: "Set bounded payload gain. arg: 0.1–10.0"

  # ── Sequencer controls (target_id 40) ──────────────────────────────────────
  - name: "SEQ_SET_TARGET"
    target_id: 40
    opcode: 1
    op_class: "HOUSEKEEPING"
    description: "Sequencer stage: set target component ID"

  - name: "SEQ_SET_OPCODE"
    target_id: 40
    opcode: 2
    op_class: "HOUSEKEEPING"
    description: "Sequencer stage: set opcode"

  - name: "SEQ_SET_ARGUMENT"
    target_id: 40
    opcode: 3
    op_class: "HOUSEKEEPING"
    description: "Sequencer stage: set argument"

  - name: "SEQ_COMMIT_DELAY"
    target_id: 40
    opcode: 4
    op_class: "HOUSEKEEPING"
    description: "Sequencer commit: schedule staged command after arg seconds"

  - name: "SEQ_CLEAR_QUEUE"
    target_id: 40
