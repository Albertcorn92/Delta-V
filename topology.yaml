    op_class: "HOUSEKEEPING"
    description: "Dwell/Patch: set address upper 16 bits"

  - name: "DWELL_SET_ADDR_LO16"
    target_id: 42
    opcode: 11
    op_class: "HOUSEKEEPING"
    description: "Dwell/Patch: set address lower 16 bits"

  - name: "DWELL_READ_ADDRESS"
    target_id: 42
    opcode: 12
    op_class: "HOUSEKEEPING"
    description: "Dwell: read staged address word"

  - name: "DWELL_SET_VALUE_HI16"
    target_id: 42
    opcode: 13
    op_class: "HOUSEKEEPING"
    description: "Patch: set value upper 16 bits"

  - name: "DWELL_SET_VALUE_LO16"
    target_id: 42
