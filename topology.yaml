    op_class: "HOUSEKEEPING"
    description: "File transfer: reset session state"

  # ── Dwell controls (target_id 42) ─────────────────────────────────────────
  - name: "DWELL_SELECT_CHANNEL"
    target_id: 42
    opcode: 1
    op_class: "HOUSEKEEPING"
    description: "Dwell: select diagnostic channel"

  - name: "DWELL_SET_PERIOD"
    target_id: 42
    opcode: 2
